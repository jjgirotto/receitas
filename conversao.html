<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conversão de Medidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="container mt-5">
        <h3 class="section-title mb-4">Conversão de Medidas</h3>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm p-3 mb-4">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Xícara</th>
                                <th>ml</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>1 xícara</td><td>240 ml</td></tr>
                            <tr><td>1/2 xícara</td><td>120 ml</td></tr>
                            <tr><td>1/4 xícara</td><td>60 ml</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-3 mb-4">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Colher</th>
                                <th>ml</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>1 colher sopa</td><td>15 ml</td></tr>
                            <tr><td>1 colher chá</td><td>5 ml</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
